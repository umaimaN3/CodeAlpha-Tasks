<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - SocialHub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>SocialHub</h1>
    </div>
    
    <div id="message" class="error-message"></div>
    
    <input type="text" id="username" class="auth-input" placeholder="Username">
    <input type="email" id="email" class="auth-input" placeholder="Email">
    <input type="password" id="password" class="auth-input" placeholder="Password">
    
    <button class="btn-auth" onclick="registerUser()">Sign Up</button>
    
    <div class="auth-divider">
      <span>OR</span>
    </div>
    
    <div class="auth-footer">
      Already have an account? <a href="login.html">Log In</a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
